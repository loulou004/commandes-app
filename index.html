<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Commandes</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#d4f24e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Commandes">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --border: #2a2a30;
    --accent: #d4f24e;
    --accent2: #4ef2a0;
    --accent3: #f24e7a;
    --text: #e8e8ec;
    --muted: #6b6b7a;
    --radius: 16px;
    --fab-h: 72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding-bottom: calc(var(--fab-h) + 24px);
    width: 100%;
    overflow-x: hidden;
  }

  header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    width: 100%;
  }

  .header-row1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }

  .header-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .btn-csv, .btn-drive {
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-csv { color: var(--accent); }
  .btn-csv:active { background: rgba(212,242,78,0.08); }
  .btn-drive { color: var(--muted); }
  .btn-drive.connected { color: var(--accent2); border-color: rgba(78,242,160,0.3); }
  .btn-drive:active { background: rgba(255,255,255,0.04); }

  .sync-bar {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  .sync-bar.visible { display: flex; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sync-bar.syncing .sync-dot { background: var(--accent); animation: pulse 1s infinite; }
  .sync-bar.ok .sync-dot { background: var(--accent2); }
  .sync-bar.err .sync-dot { background: var(--accent3); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .stats { display: flex; gap: 6px; margin-bottom: 8px; }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 4px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    display: block;
    line-height: 1;
  }
  .stat-label { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; }
  .stat:nth-child(2) .stat-val { color: var(--accent2); }
  .stat:nth-child(3) .stat-val { color: var(--accent3); }

  .filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    white-space: nowrap;
    min-height: 34px;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0f11; font-weight: 500; }

  .list { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; width: 100%; }

  .empty { text-align: center; color: var(--muted); padding: 40px 12px; font-size: 14px; line-height: 2; }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    width: 100%;
  }
  .card-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border); transition: background 0.2s; }
  .card.all-done .card-stripe { background: var(--accent2); }
  .card.partial .card-stripe  { background: var(--accent); }

  .card-body { padding: 10px 10px 8px 14px; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); flex: 1; padding-right: 8px; line-height: 1.2; }
  .card-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .card-amount { font-size: 15px; font-weight: 500; color: var(--accent); white-space: nowrap; }

  .badges { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

  .badge {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 8px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    min-height: 36px;
    transition: all 0.15s;
  }
  .badge-icon { font-size: 15px; line-height: 1; }
  .badge-label { font-size: 11px; font-family: 'DM Mono', monospace; }

  .badge.on { border-color: currentColor; }
  .badge.on.facture { color: #7eb8f7; background: rgba(126,184,247,0.08); }
  .badge.on.paye    { color: var(--accent2); background: rgba(78,242,160,0.08); }
  .badge.on.livre   { color: var(--accent);  background: rgba(212,242,78,0.08); }

  .card-actions { display: flex; border-top: 1px solid var(--border); margin-top: 8px; }
  .btn-edit, .btn-delete {
    flex: 1; font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px;
    border: none; background: transparent; cursor: pointer; color: var(--muted); transition: background 0.15s;
  }
  .btn-edit:active   { background: rgba(255,255,255,0.04); color: var(--text); }
  .btn-delete        { color: var(--accent3); border-left: 1px solid var(--border); }
  .btn-delete:active { background: rgba(242,78,122,0.08); }

  .fab {
    position: fixed;
    bottom: 16px;
    left: 12px;
    right: 12px;
    height: var(--fab-h);
    background: var(--accent);
    color: #0f0f11;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(212,242,78,0.35);
    transition: opacity 0.15s;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .fab:active { opacity: 0.85; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 30; align-items: flex-end; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 0 16px 28px; width: 100%;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }

  .modal h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); margin-bottom: 14px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .field input {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 15px; padding: 11px 12px; border-radius: 10px; outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel, .btn-save {
    flex: 1; padding: 13px; border-radius: 12px;
    font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; cursor: pointer; border: none;
  }
  .btn-cancel { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
  .btn-save   { background: var(--accent); color: #0f0f11; }
  .btn-save:active { opacity: 0.85; }
</style>
</head>
<body>

<header>
  <div class="header-row1">
    <h1>📦 Commandes</h1>
    <div class="header-btns">
      <button class="btn-drive" id="btnDrive" onclick="toggleDrive()">☁ Drive</button>
      <button class="btn-csv" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <span class="stat-val" id="statTotal">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statPaye">0</span>
      <span class="stat-label">Payées</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statAttente">0</span>
      <span class="stat-label">En attente</span>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tout</button>
    <button class="filter-btn" onclick="setFilter('nofacture',this)">Sans facture</button>
    <button class="filter-btn" onclick="setFilter('nonpaye',this)">Non payé</button>
    <button class="filter-btn" onclick="setFilter('nonlivre',this)">Non livré</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Terminé ✓</button>
  </div>
</header>

<div class="sync-bar" id="syncBar">
  <div class="sync-dot"></div>
  <span id="syncMsg">Non connecté à Drive</span>
</div>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">＋ Nouvelle commande</button>

<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nouvelle commande</h2>
    <div class="field">
      <label>Fournisseur / Nom</label>
      <input type="text" id="fNom" placeholder="Ex : Dupont Fournitures" autocomplete="off" />
    </div>
    <div class="field">
      <label>N° de commande</label>
      <input type="text" id="fRef" placeholder="Ex : CMD-2024-001" autocomplete="off" />
    </div>
    <div class="field">
      <label>Montant (€)</label>
      <input type="number" id="fMontant" placeholder="0,00" step="0.01" inputmode="decimal" />
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="fDate" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveCommande()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const CLIENT_ID = '832974454960-ppkdd7da3s2f81lsa4vp0mlqdo6mutii.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const FILENAME = 'commandes_backup.json';

// ── ÉTAT ──
let commandes = JSON.parse(localStorage.getItem('commandes') || '[]');
let editId = null;
let currentFilter = 'all';
let accessToken = null;
let driveFileId = localStorage.getItem('driveFileId') || null;
let syncTimer = null;

// ── LOCALSTORAGE ──
function save() {
  localStorage.setItem('commandes', JSON.stringify(commandes));
  scheduleDriveSync();
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── GOOGLE DRIVE ──
function toggleDrive() {
  if (accessToken) {
    // Déconnexion
    accessToken = null;
    driveFileId = null;
    localStorage.removeItem('driveFileId');
    document.getElementById('btnDrive').textContent = '☁ Drive';
    document.getElementById('btnDrive').classList.remove('connected');
    setSyncBar('', false);
  } else {
    connectDrive();
  }
}

function connectDrive() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { setSyncBar('Erreur connexion Drive', false, true); return; }
      accessToken = resp.access_token;
      document.getElementById('btnDrive').textContent = '✓ Drive';
      document.getElementById('btnDrive').classList.add('connected');
      setSyncBar('Connecté — recherche sauvegarde…', true);
      findOrCreateFile().then(() => syncToDrive());
    }
  });
  client.requestAccessToken();
}

async function findOrCreateFile() {
  // Cherche le fichier existant
  if (driveFileId) return; // déjà connu
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${FILENAME}'+and+trashed=false&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) {
    driveFileId = data.files[0].id;
    localStorage.setItem('driveFileId', driveFileId);
    // Charger les données depuis Drive si localStorage vide
    if (commandes.length === 0) await loadFromDrive();
  }
}

async function loadFromDrive() {
  if (!driveFileId || !accessToken) return;
  try {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const data = await res.json();
    if (Array.isArray(data)) {
      commandes = data;
      localStorage.setItem('commandes', JSON.stringify(commandes));
      render();
    }
  } catch(e) {}
}

function scheduleDriveSync() {
  if (!accessToken) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncToDrive(), 1500); // délai 1.5s après dernière modif
}

async function syncToDrive() {
  if (!accessToken) return;
  setSyncBar('Sauvegarde en cours…', true);
  try {
    const content = JSON.stringify(commandes);
    const blob = new Blob([content], { type: 'application/json' });

    if (driveFileId) {
      // Mise à jour du fichier existant
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: content
      });
    } else {
      // Création du fichier
      const meta = { name: FILENAME, mimeType: 'application/json' };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` },
        body: form
      });
      const data = await res.json();
      driveFileId = data.id;
      localStorage.setItem('driveFileId', driveFileId);
    }

    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    setSyncBar(`✓ Sauvegardé sur Drive à ${now}`, false, false, true);
  } catch(e) {
    setSyncBar('Erreur de sauvegarde Drive', false, true);
  }
}

function setSyncBar(msg, syncing = false, err = false, ok = false) {
  const bar = document.getElementById('syncBar');
  const msgEl = document.getElementById('syncMsg');
  bar.className = 'sync-bar visible';
  if (syncing) bar.classList.add('syncing');
  if (err) bar.classList.add('err');
  if (ok) bar.classList.add('ok');
  msgEl.textContent = msg;
  if (!msg) bar.classList.remove('visible');
}

// ── FILTRES ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filtered() {
  return commandes.filter(c => {
    if (currentFilter === 'all')       return true;
    if (currentFilter === 'nofacture') return !c.facture;
    if (currentFilter === 'nonpaye')   return !c.paye;
    if (currentFilter === 'nonlivre')  return !c.livre;
    if (currentFilter === 'done')      return c.facture && c.paye && c.livre;
    return true;
  }).sort((a, b) => b.id.localeCompare(a.id));
}

// ── ACTIONS ──
function toggleBadge(id, field) {
  const c = commandes.find(x => x.id === id);
  if (!c) return;
  c[field] = !c[field];
  save(); render();
}

function render() {
  const list = document.getElementById('list');
  const data = filtered();

  document.getElementById('statTotal').textContent   = commandes.length;
  document.getElementById('statPaye').textContent    = commandes.filter(c => c.paye).length;
  document.getElementById('statAttente').textContent = commandes.filter(c => !c.paye).length;

  if (!data.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>Aucune commande${currentFilter !== 'all' ? ' dans ce filtre' : ''}<br>Appuie sur le bouton en bas pour commencer</div>`;
    return;
  }

  list.innerHTML = data.map(c => {
    const allDone    = c.facture && c.paye && c.livre;
    const partial    = c.facture || c.paye || c.livre;
    const cardClass  = allDone ? 'all-done' : (partial ? 'partial' : '');
    const dateStr    = c.date ? new Date(c.date).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'}) : '';
    const montantStr = c.montant ? parseFloat(c.montant).toLocaleString('fr-FR',{minimumFractionDigits:2}) + ' €' : '';
    return `
    <div class="card ${cardClass}">
      <div class="card-stripe"></div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-name">${escHtml(c.nom||'—')}</div>
            <div class="card-meta">${c.ref?'#'+escHtml(c.ref):''}${c.ref&&dateStr?' · ':''}${dateStr}</div>
          </div>
          ${montantStr?`<div class="card-amount">${montantStr}</div>`:''}
        </div>
        <div class="badges">
          <div class="badge facture ${c.facture?'on':''}" onclick="toggleBadge('${c.id}','facture')">
            <span class="badge-icon">${c.facture?'✅':'🧾'}</span>
            <span class="badge-label">Facture</span>
          </div>
          <div class="badge paye ${c.paye?'on':''}" onclick="toggleBadge('${c.id}','paye')">
            <span class="badge-icon">${c.paye?'✅':'💳'}</span>
            <span class="badge-label">Payé</span>
          </div>
          <div class="badge livre ${c.livre?'on':''}" onclick="toggleBadge('${c.id}','livre')">
            <span class="badge-icon">${c.livre?'✅':'📦'}</span>
            <span class="badge-label">Livré</span>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-edit" onclick="openModal('${c.id}')">✏️ Modifier</button>
        <button class="btn-delete" onclick="deleteCommande('${c.id}')">🗑 Supprimer</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Modifier' : 'Nouvelle commande';
  if (id) {
    const c = commandes.find(x => x.id === id);
    document.getElementById('fNom').value     = c.nom||'';
    document.getElementById('fRef').value     = c.ref||'';
    document.getElementById('fMontant').value = c.montant||'';
    document.getElementById('fDate').value    = c.date||'';
  } else {
    document.getElementById('fNom').value     = '';
    document.getElementById('fRef').value     = '';
    document.getElementById('fMontant').value = '';
    document.getElementById('fDate').value    = new Date().toISOString().split('T')[0];
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
  }
}

function saveCommande() {
  const nom = document.getElementById('fNom').value.trim();
  if (!nom) { document.getElementById('fNom').focus(); return; }
  if (editId) {
    const c = commandes.find(x => x.id === editId);
    c.nom = nom; c.ref = document.getElementById('fRef').value.trim();
    c.montant = document.getElementById('fMontant').value;
    c.date = document.getElementById('fDate').value;
  } else {
    commandes.push({
      id: genId(), nom,
      ref: document.getElementById('fRef').value.trim(),
      montant: document.getElementById('fMontant').value,
      date: document.getElementById('fDate').value,
      facture: false, paye: false, livre: false
    });
  }
  save(); closeModal(); render();
}

function deleteCommande(id) {
  if (!confirm('Supprimer cette commande ?')) return;
  commandes = commandes.filter(c => c.id !== id);
  save(); render();
}

function exportCSV() {
  if (!commandes.length) { alert('Aucune commande à exporter.'); return; }
  const sep = ';';
  const header = ['Date','Fournisseur','N° commande','Montant (€)','Facture','Payé','Livré'].join(sep);
  const rows = commandes.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(c=>[
    c.date||'',
    '"'+(c.nom||'').replace(/"/g,'""')+'"',
    '"'+(c.ref||'').replace(/"/g,'""')+'"',
    c.montant?String(c.montant).replace('.',','):'',
    c.facture?'Oui':'Non', c.paye?'Oui':'Non', c.livre?'Oui':'Non'
  ].join(sep));
  const csv = '\uFEFF'+header+'\n'+rows.join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`commandes_${new Date().toISOString().split('T')[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ── INIT ──
document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
